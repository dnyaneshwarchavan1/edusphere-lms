apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: edusphere-lms
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: dnyaneshvarchavan/edusphere-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  labels:
    app: edusphere-lms
spec:
  ports:
    - port: 80
      targetPort: 80
      name: http
  selector:
    app: frontend
  type: LoadBalancer
