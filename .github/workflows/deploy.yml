name: CI/CD Production Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build & Publish Containers to Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build and Push Backend Image
      - name: Build & Push Backend Container
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            dnyaneshvarchavan/edusphere-backend:latest
            dnyaneshvarchavan/edusphere-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and Push Frontend Image
      - name: Build & Push Frontend Container
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            dnyaneshvarchavan/edusphere-frontend:latest
            dnyaneshvarchavan/edusphere-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
