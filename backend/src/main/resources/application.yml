server:
  port: ${PORT:8080}

spring:
  application:
    name: edusphere-lms
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/edusphere_lms?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

app:
  jwt-secret: ${JWT_SECRET:change-this-secret-key-change-this-secret-key}
  jwt-expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  razorpay-key-id: ${RAZORPAY_KEY_ID:}
  razorpay-key-secret: ${RAZORPAY_KEY_SECRET:}
  razorpay-base-url: ${RAZORPAY_BASE_URL:https://api.razorpay.com}
  storage-root: ${STORAGE_ROOT:storage}
  storage:
    provider: ${STORAGE_PROVIDER:local}
    cloudinary:
      cloud-name: ${CLOUDINARY_CLOUD_NAME:}
      api-key: ${CLOUDINARY_API_KEY:}
      api-secret: ${CLOUDINARY_API_SECRET:}
      folder: ${CLOUDINARY_FOLDER:edusphere-lms}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html
